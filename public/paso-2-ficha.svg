<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="400" height="300" fill="#0a0a14"/>

  <!-- Portada del anime -->
  <rect x="40" y="40" width="100" height="150" rx="8" fill="#1a3a5a" stroke="#00b8ff" stroke-width="2"/>
  <text x="50" y="120" font-family="Arial" font-size="24" fill="#00b8ff" font-weight="bold">AOT</text>

  <!-- Información -->
  <g>
    <text x="160" y="60" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">Attack on Titan</text>
    <text x="160" y="90" font-family="Arial" font-size="14" fill="#00b8ff">Anime • 2013 • 4 Temporadas</text>

    <!-- Descripción -->
    <rect x="160" y="110" width="220" height="60" fill="#1a1a2e" rx="6" stroke="#00b8ff" stroke-width="1" opacity="0.5"/>
    <text x="170" y="130" font-family="Arial" font-size="12" fill="#aaa">Una épica aventura donde</text>
    <text x="170" y="148" font-family="Arial" font-size="12" fill="#aaa">la humanidad lucha contra</text>
    <text x="170" y="166" font-family="Arial" font-size="12" fill="#aaa">titanes gigantes...</text>

    <!-- Botón descargar -->
    <rect x="160" y="190" width="220" height="40" rx="8" fill="#00b8ff" opacity="0.2" stroke="#00b8ff" stroke-width="2"/>
    <text x="265" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#00b8ff">→ Ver Episodios</text>
  </g>

  <!-- Flecha resultado -->
  <path d="M 320 250 L 360 250 M 350 240 L 360 250 L 350 260" stroke="#00b8ff" stroke-width="2" fill="none"/>
</svg>