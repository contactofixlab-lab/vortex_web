<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="400" height="300" fill="#0a0a14"/>

  <!-- Lista de episodios -->
  <text x="40" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#00b8ff">Temporada 1 - Episodios:</text>

  <!-- Episodio 1 -->
  <rect x="40" y="50" width="320" height="40" rx="6" fill="#1a2a3a" stroke="#b892f6" stroke-width="2" opacity="0.7"/>
  <text x="60" y="80" font-family="Arial" font-size="14" fill="#fff">Episodio 1: Quiénes somos</text>

  <!-- Episodio 2 -->
  <rect x="40" y="105" width="320" height="40" rx="6" fill="#1a2a3a" stroke="#00b8ff" stroke-width="1" opacity="0.5"/>
  <text x="60" y="135" font-family="Arial" font-size="14" fill="#fff">Episodio 2: Ese día</text>

  <!-- Episodio 3 (seleccionado) -->
  <rect x="40" y="160" width="320" height="40" rx="6" fill="#00b8ff" opacity="0.3" stroke="#00b8ff" stroke-width="2"/>
  <circle cx="360" cy="180" r="6" fill="#00b8ff"/>
  <text x="60" y="190" font-family="Arial" font-size="14" font-weight="bold" fill="#00b8ff">✓ Episodio 3: La gloria de la indiferencia</text>

  <!-- Flecha -->
  <path d="M 320 250 L 360 250 M 350 240 L 360 250 L 350 260" stroke="#00b8ff" stroke-width="2" fill="none"/>
</svg>